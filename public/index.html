<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f5f5f5">
  <title>Puzzles</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/numpuz.css">
  <link rel="stylesheet" href="/css/memory.css">
</head>
<body class="no-transition">

  <!-- Screen 1: Edit Name -->
  <section id="screen-username" class="screen active">
    <div id="username-loader" class="screen-content">
      <div class="spinner"></div>
    </div>
    <header id="username-header" class="game-header" style="display:none">
      <button id="btn-back-username" class="btn-icon" aria-label="Back">&#8592;</button>
      <h1 class="game-header-title">Profile</h1>
      <div></div>
    </header>
    <div id="username-form" class="screen-content screen-content-top" style="display:none">
      <input type="text" id="username-input" placeholder="Your name" maxlength="20" autocomplete="off" data-1p-ignore data-lpignore="true" data-form-type="other">
      <button id="username-submit" class="btn-text" disabled>Save</button>
    </div>
  </section>

  <!-- Screen 2: Game Selection -->
  <section id="screen-select" class="screen">
    <header class="app-header">
      <h1 class="app-title-small">Puzzles</h1>
      <button id="change-name" class="user-badge" aria-label="Change name">
        <span id="display-name"></span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </header>
    <div class="screen-content screen-content-top select-content">
      <div class="game-list">
        <button class="game-card" data-game="numpuz">
          <div class="game-card-icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="3" fill="currentColor" opacity="0.8"/><rect x="26" y="2" width="20" height="20" rx="3" fill="currentColor" opacity="0.6"/><rect x="2" y="26" width="20" height="20" rx="3" fill="currentColor" opacity="0.4"/><rect x="26" y="26" width="20" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3" opacity="0.3"/></svg></div>
          <div class="game-card-info">
            <div class="game-card-title">Sliding Numbers</div>
            <div class="game-card-desc">Classic sliding puzzle</div>
          </div>
        </button>
        <button class="game-card" data-game="memory">
          <div class="game-card-icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="3" fill="currentColor" opacity="0.8"/><rect x="26" y="2" width="20" height="20" rx="3" fill="currentColor" opacity="0.8"/><rect x="2" y="26" width="20" height="20" rx="3" fill="currentColor" opacity="0.4"/><rect x="26" y="26" width="20" height="20" rx="3" fill="currentColor" opacity="0.4"/><text x="12" y="16" text-anchor="middle" font-size="14" font-weight="bold" fill="white">?</text><text x="36" y="16" text-anchor="middle" font-size="14" font-weight="bold" fill="white">?</text><text x="12" y="40" text-anchor="middle" font-size="12" fill="white">&#9733;</text><text x="36" y="40" text-anchor="middle" font-size="12" fill="white">&#9733;</text></svg></div>
          <div class="game-card-info">
            <div class="game-card-title">Memory Cards</div>
            <div class="game-card-desc">Find matching pairs</div>
          </div>
        </button>
      </div>
      <button id="btn-leaderboard" class="btn-text" style="margin-top: var(--space-md)">View leaderboard</button>
    </div>
  </section>

  <!-- Screen 3: Game Play -->
  <section id="screen-game" class="screen">
    <header class="game-header">
      <button id="btn-back" class="btn-icon" aria-label="Back">&#8592;</button>
      <h1 id="game-title" class="game-header-title">Sliding Numbers</h1>
      <button id="btn-new-game" class="btn-text">New</button>
    </header>
    <div id="game-container" class="game-container"></div>
    <div class="game-footer">
      <div id="game-stats" class="game-stats">0 moves · 0:00</div>
    </div>
  </section>

  <!-- Screen 4: Leaderboard -->
  <section id="screen-leaderboard" class="screen">
    <header class="game-header">
      <button id="btn-back-leaderboard" class="btn-icon" aria-label="Back">&#8592;</button>
      <h1 class="game-header-title">Leaderboard</h1>
      <div></div>
    </header>
    <div class="screen-content screen-content-top leaderboard-content">
      <div id="leaderboard-spinner" class="leaderboard-empty"><div class="spinner"></div></div>
      <div id="leaderboard-list" class="leaderboard-list"></div>
      <div id="leaderboard-empty" class="leaderboard-empty">No scores yet. Play a game!</div>
    </div>
  </section>

  <!-- Win overlay -->
  <div id="win-overlay" class="overlay hidden">
    <div class="overlay-content">
      <h2 class="win-title">Solved!</h2>
      <p id="win-time" class="win-stat"></p>
      <p id="win-moves" class="win-stat"></p>
      <p id="win-rank" class="win-rank"></p>
      <button id="btn-play-again" class="btn-primary">Play again</button>
      <button id="btn-back-to-menu" class="btn-secondary">Back to menu</button>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') reg.update();
        });
      });
    }
  </script>
</body>
</html>
