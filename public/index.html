<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f5f5f5">
  <title>Puzzles</title>
  <link rel="icon" href="/favicon.svg?v=20260306" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=20260306">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" href="/splash-640x1136.png">

  <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1242x2208.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1125x2436.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/splash-828x1792.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1242x2688.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1170x2532.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1284x2778.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1179x2556.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1290x2796.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1206x2622.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1320x2868.png">
  <link rel="stylesheet" href="/css/reset.css?v=20260305c">
  <link rel="stylesheet" href="/css/theme.css?v=20260305c">
  <link rel="stylesheet" href="/css/layout.css?v=20260305c">
  <link rel="stylesheet" href="/css/numpuz.css?v=20260305c">
  <link rel="stylesheet" href="/css/memory.css?v=20260305c">
  <link rel="stylesheet" href="/css/lights.css?v=20260305c">
</head>
<body class="no-transition">

  <!-- Screen 1: Edit Name -->
  <section id="screen-username" class="screen active">
    <div id="username-loader" class="screen-content">
      <div class="spinner"></div>
    </div>
    <header id="username-header" class="game-header" style="display:none">
      <button id="btn-back-username" class="btn-icon" aria-label="Back">&#8592;</button>
      <h1 id="username-title" class="game-header-title">Profile</h1>
      <div></div>
    </header>
    <div id="username-form" class="screen-content screen-content-top" style="display:none">
      <input type="text" id="username-input" placeholder="Your name" maxlength="20" autocomplete="off" data-1p-ignore data-lpignore="true" data-form-type="other">
      <button id="username-submit" class="btn-text" disabled>Save</button>
    </div>
  </section>

  <!-- Screen 2: Game Selection -->
  <section id="screen-select" class="screen">
    <header class="app-header">
      <h1 class="app-title-small">Puzzles</h1>
      <button id="change-name" class="user-badge" aria-label="Change name">
        <span id="display-name"></span>
        <svg width="20" height="20" viewBox="-1 -1 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      </button>
    </header>
    <div class="screen-content screen-content-top select-content">
      <div class="game-list">
        <button class="game-card" data-game="numpuz">
          <div class="game-card-icon"><svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10,2 H14 C20,2 22,4 22,10 V14 C22,20 20,22 14,22 H10 C4,22 2,20 2,14 V10 C2,4 4,2 10,2 Z" fill="currentColor" opacity="0.8"/><path d="M34,2 H38 C44,2 46,4 46,10 V14 C46,20 44,22 38,22 H34 C28,22 26,20 26,14 V10 C26,4 28,2 34,2 Z" fill="currentColor" opacity="0.6"/><path d="M10,26 H14 C20,26 22,28 22,34 V38 C22,44 20,46 14,46 H10 C4,46 2,44 2,38 V34 C2,28 4,26 10,26 Z" fill="currentColor" opacity="0.4"/><path d="M34,26 H38 C44,26 46,28 46,34 V38 C46,44 44,46 38,46 H34 C28,46 26,44 26,38 V34 C26,28 28,26 34,26 Z" fill="currentColor" opacity="0.15"/></svg></div>
          <div class="game-card-info">
            <div class="game-card-title">Sliding Numbers</div>
            <div class="game-card-desc">Classic sliding puzzle</div>
          </div>
        </button>
        <button class="game-card" data-game="memory">
          <div class="game-card-icon"><svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10,2 H14 C20,2 22,4 22,10 V14 C22,20 20,22 14,22 H10 C4,22 2,20 2,14 V10 C2,4 4,2 10,2 Z" fill="currentColor" opacity="0.8"/><path d="M34,2 H38 C44,2 46,4 46,10 V14 C46,20 44,22 38,22 H34 C28,22 26,20 26,14 V10 C26,4 28,2 34,2 Z" fill="currentColor" opacity="0.4"/><path d="M10,26 H14 C20,26 22,28 22,34 V38 C22,44 20,46 14,46 H10 C4,46 2,44 2,38 V34 C2,28 4,26 10,26 Z" fill="currentColor" opacity="0.4"/><path d="M34,26 H38 C44,26 46,28 46,34 V38 C46,44 44,46 38,46 H34 C28,46 26,44 26,38 V34 C26,28 28,26 34,26 Z" fill="currentColor" opacity="0.8"/><text x="12" y="17" text-anchor="middle" font-size="14" font-weight="bold" fill="white">?</text><text x="36" y="17" text-anchor="middle" font-size="14" font-weight="bold" fill="white">?</text><text x="12" y="41" text-anchor="middle" font-size="12" fill="white">&#9733;</text><text x="36" y="41" text-anchor="middle" font-size="12" fill="white">&#9733;</text></svg></div>
          <div class="game-card-info">
            <div class="game-card-title">Memory Cards</div>
            <div class="game-card-desc">Find matching pairs</div>
          </div>
        </button>
        <button class="game-card" data-game="lights">
          <div class="game-card-icon"><svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7,2 H9 C12,2 14,4 14,7 V9 C14,12 12,14 9,14 H7 C4,14 2,12 2,9 V7 C2,4 4,2 7,2 Z" fill="currentColor" opacity="0.2"/><path d="M23,2 H25 C28,2 30,4 30,7 V9 C30,12 28,14 25,14 H23 C20,14 18,12 18,9 V7 C18,4 20,2 23,2 Z" fill="currentColor" opacity="0.8"/><path d="M39,2 H41 C44,2 46,4 46,7 V9 C46,12 44,14 41,14 H39 C36,14 34,12 34,9 V7 C34,4 36,2 39,2 Z" fill="currentColor" opacity="0.2"/><path d="M7,18 H9 C12,18 14,20 14,23 V25 C14,28 12,30 9,30 H7 C4,30 2,28 2,25 V23 C2,20 4,18 7,18 Z" fill="currentColor" opacity="0.8"/><path d="M23,18 H25 C28,18 30,20 30,23 V25 C30,28 28,30 25,30 H23 C20,30 18,28 18,25 V23 C18,20 20,18 23,18 Z" fill="currentColor" opacity="0.8"/><path d="M39,18 H41 C44,18 46,20 46,23 V25 C46,28 44,30 41,30 H39 C36,30 34,28 34,25 V23 C34,20 36,18 39,18 Z" fill="currentColor" opacity="0.8"/><path d="M7,34 H9 C12,34 14,36 14,39 V41 C14,44 12,46 9,46 H7 C4,46 2,44 2,41 V39 C2,36 4,34 7,34 Z" fill="currentColor" opacity="0.2"/><path d="M23,34 H25 C28,34 30,36 30,39 V41 C30,44 28,46 25,46 H23 C20,46 18,44 18,41 V39 C18,36 20,34 23,34 Z" fill="currentColor" opacity="0.8"/><path d="M39,34 H41 C44,34 46,36 46,39 V41 C46,44 44,46 41,46 H39 C36,46 34,44 34,41 V39 C34,36 36,34 39,34 Z" fill="currentColor" opacity="0.2"/></svg></div>
          <div class="game-card-info">
            <div class="game-card-title">Lights Out</div>
            <div class="game-card-desc">Turn off all the lights</div>
          </div>
        </button>
      </div>
      <button id="btn-leaderboard" class="btn-text" style="margin-top: var(--space-md)">View leaderboard</button>
    </div>
  </section>

  <!-- Screen 3: Game Play -->
  <section id="screen-game" class="screen">
    <header class="game-header">
      <button id="btn-back" class="btn-icon" aria-label="Back"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
      <h1 id="game-title" class="game-header-title">Sliding Numbers</h1>
      <button id="btn-new-game" class="btn-icon" aria-label="Reset"><svg width="24" height="24" viewBox="-1 -1 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg></button>
    </header>
    <div id="game-container" class="game-container"></div>
    <div class="game-footer">
      <div id="game-stats" class="game-stats">0 moves · 0:00</div>
    </div>
  </section>

  <!-- Screen 4: Leaderboard -->
  <section id="screen-leaderboard" class="screen">
    <header class="game-header">
      <button id="btn-back-leaderboard" class="btn-icon" aria-label="Back">&#8592;</button>
      <h1 class="game-header-title">Leaderboard</h1>
      <div></div>
    </header>
    <div class="screen-content screen-content-top leaderboard-content">
      <div id="leaderboard-spinner" class="leaderboard-empty"><div class="spinner"></div></div>
      <div id="leaderboard-list" class="leaderboard-list"></div>
      <div id="leaderboard-empty" class="leaderboard-empty">No scores yet. Play a game!</div>
    </div>
  </section>

  <!-- Win overlay -->
  <div id="win-overlay" class="overlay hidden">
    <div class="overlay-content">
      <h2 class="win-title">Solved!</h2>
      <p id="win-time" class="win-stat"></p>
      <p id="win-moves" class="win-stat"></p>
      <p id="win-rank" class="win-rank"></p>
      <button id="btn-play-again" class="btn-primary">Play again</button>
      <button id="btn-back-to-menu" class="btn-secondary">Back to menu</button>
    </div>
  </div>

  <script type="module" src="/js/app.js?v=20260305c"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') reg.update();
        });
      });
    }
  </script>
</body>
</html>
